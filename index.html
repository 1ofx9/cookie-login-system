<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="card" id="login-card">
        <h1>Login Form</h1>
        <p class="subtitle">Enter your credentials to access your account.</p>
        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="identifier">Email or Username</label>
                <input type="text" id="identifier" placeholder="Username or Email" autocomplete="username">
                <div class="error-message" id="identifier-error"></div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><title>Show Password</title><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <div class="error-message" id="password-error"></div>
            </div>
            <button type="submit" id="submit-btn" class="submit-btn">Log In</button>
        </form>
        <footer class="card-footer">
            <p>Don't have an account? <a id="signup-link" href="./signup.html">Sign up</a></p>
        </footer>
    </main>

    <div id="toast" class="success-toast">
        Successfully logged in!
    </div>

    <script src="script.js"></script>
</body>
</html>
