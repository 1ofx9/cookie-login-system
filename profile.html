<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="card" id="profile-card">
        <h1>User Profile</h1>
        <p class="subtitle">Your account information.</p>
        
        <div id="dashboard-content" class="dashboard-info">
            <div class="info-row">
                <span class="label">Name</span>
                <span id="user-name" class="value">—</span>
            </div>
            <div class="info-row">
                <span class="label">Username</span>
                <span id="user-uname" class="value">—</span>
            </div>
            <div class="info-row">
                <span class="label">Email</span>
                <span id="user-email" class="value">—</span>
            </div>
        </div>

        <button type="button" id="logout-btn">Log Out</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
